name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (for example v1.0.0 or v1.0.0-preview)'
        required: true
        type: string
      simple_release:
        description: 'Only publish the linux/amd64 GHCR image'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# A release updates shared GitHub Release/container tags and finally syncs VERSION
# to the default branch. Never allow two releases for the same tag to overlap.
concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  GO_VERSION_EXPECTED: '1.26.5'
  NODE_VERSION: '22.13.1'
  PNPM_VERSION: '9.15.9'

jobs:
  release-meta:
    name: Resolve immutable release source
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      tag_sha: ${{ steps.meta.outputs.tag_sha }}
      version: ${{ steps.meta.outputs.version }}
      is_preview: ${{ steps.meta.outputs.is_preview }}
      simple_release: ${{ steps.meta.outputs.simple_release }}
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Validate tag and resolve commit
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_SIMPLE_RELEASE: ${{ inputs.simple_release }}
          DEFAULT_SIMPLE_RELEASE: ${{ vars.SIMPLE_RELEASE }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG_NAME="$(printf '%s' "$DISPATCH_TAG" | xargs)"
            SIMPLE_RELEASE="${DISPATCH_SIMPLE_RELEASE:-false}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            SIMPLE_RELEASE="${DEFAULT_SIMPLE_RELEASE:-false}"
          fi

          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release tag: $TAG_NAME" >&2
            exit 1
          fi

          git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          if ! git show-ref --verify --quiet "refs/tags/${TAG_NAME}"; then
            echo "Tag does not exist on origin: $TAG_NAME" >&2
            exit 1
          fi

          TAG_SHA="$(git rev-list -n 1 "${TAG_NAME}^{commit}")"
          if [ -z "$TAG_SHA" ]; then
            echo "Unable to resolve tag commit: $TAG_NAME" >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          IS_PREVIEW=false
          if [[ "$VERSION" == *-preview* ]]; then
            IS_PREVIEW=true
          fi
          if [ "$SIMPLE_RELEASE" != "true" ]; then
            SIMPLE_RELEASE=false
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_preview=$IS_PREVIEW" >> "$GITHUB_OUTPUT"
          echo "simple_release=$SIMPLE_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG_NAME -> $TAG_SHA"

  verify-source:
    name: Verify backend and release configuration
    needs: [release-meta]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.release-meta.outputs.tag_name }}

      - name: Verify immutable checkout
        env:
          EXPECTED_SHA: ${{ needs.release-meta.outputs.tag_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Validate release configuration
        run: python3 tools/validate_release_configuration.py

      - name: Verify repository inventory and committed secrets
        run: |
          set -euo pipefail
          python3 tools/codebase_inventory.py --check
          make secret-scan

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Verify Go toolchain
        run: |
          set -euo pipefail
          test "$(go env GOVERSION)" = "go${GO_VERSION_EXPECTED}"

      - name: Download and verify Go modules
        working-directory: backend
        run: |
          set -euo pipefail
          go mod download
          go mod verify

      - name: Run backend unit tests
        run: |
          set -euo pipefail
          make -C backend test-unit

      - name: Run backend integration tests
        run: |
          set -euo pipefail
          make -C backend test-integration

      - name: Assert dependency files are unchanged
        run: |
          set -euo pipefail
          git diff --exit-code -- backend/go.mod backend/go.sum

      - name: Prepare VERSION artifact
        env:
          VERSION: ${{ needs.release-meta.outputs.version }}
        run: |
          set -euo pipefail
          printf '%s\n' "$VERSION" > backend/cmd/server/VERSION
          test "$(tr -d '\r\n' < backend/cmd/server/VERSION)" = "$VERSION"

      - name: Upload VERSION artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: version-file-${{ needs.release-meta.outputs.tag_name }}
          path: backend/cmd/server/VERSION
          if-no-files-found: error
          retention-days: 1

  build-frontend:
    name: Build frontend
    needs: [release-meta]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.release-meta.outputs.tag_name }}

      - name: Verify immutable checkout
        env:
          EXPECTED_SHA: ${{ needs.release-meta.outputs.tag_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pinned pnpm with Corepack
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          test "$(pnpm --version)" = "$PNPM_VERSION"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Verify frontend
        run: make test-frontend

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Verify frontend artifact
        run: |
          set -euo pipefail
          test -d backend/internal/web/dist
          test -n "$(find backend/internal/web/dist -type f -print -quit)"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-dist-${{ needs.release-meta.outputs.tag_name }}
          path: backend/internal/web/dist/
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish production release
    permissions:
      contents: write
      packages: write
    needs: [release-meta, verify-source, build-frontend]
    if: ${{ needs.release-meta.outputs.is_preview != 'true' }}
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.release-meta.outputs.tag_name }}

      - name: Verify immutable checkout
        env:
          EXPECTED_SHA: ${{ needs.release-meta.outputs.tag_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Download VERSION artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: version-file-${{ needs.release-meta.outputs.tag_name }}
          path: backend/cmd/server/

      - name: Download frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist-${{ needs.release-meta.outputs.tag_name }}
          path: backend/internal/web/dist/

      - name: Verify downloaded artifacts
        env:
          VERSION: ${{ needs.release-meta.outputs.version }}
        run: |
          set -euo pipefail
          test "$(tr -d '\r\n' < backend/cmd/server/VERSION)" = "$VERSION"
          test -n "$(find backend/internal/web/dist -type f -print -quit)"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Verify release inputs are read-only
        run: |
          set -euo pipefail
          test "$(go env GOVERSION)" = "go${GO_VERSION_EXPECTED}"
          go -C backend mod verify
          git diff --exit-code -- backend/go.mod backend/go.sum

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve container registry settings
        run: |
          set -euo pipefail
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_PUSH_ENABLED=true" >> "$GITHUB_ENV"
            echo "DOCKERHUB_RELEASE_USERNAME=$DOCKERHUB_USERNAME" >> "$GITHUB_ENV"
          else
            echo "DOCKERHUB_PUSH_ENABLED=false" >> "$GITHUB_ENV"
            echo "DOCKERHUB_RELEASE_USERNAME=skip" >> "$GITHUB_ENV"
          fi

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_PUSH_ENABLED == 'true' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read tag message
        id: tag_message
        env:
          TAG_NAME: ${{ needs.release-meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          TAG_MESSAGE="$(git for-each-ref --format='%(contents)' "refs/tags/${TAG_NAME}")"
          if [ -z "$TAG_MESSAGE" ]; then
            TAG_MESSAGE="Release ${TAG_NAME}"
          fi
          DELIMITER="TAG_MESSAGE_$(openssl rand -hex 16)"
          {
            echo "message<<${DELIMITER}"
            printf '%s\n' "$TAG_MESSAGE"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Set lowercase owner for GHCR
        id: lowercase
        run: echo "owner=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Run full GoReleaser
        if: ${{ needs.release-meta.outputs.simple_release != 'true' }}
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: '~> v2'
          args: release --clean --config=.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_RELEASE_USERNAME }}

      - name: Run simple GoReleaser
        if: ${{ needs.release-meta.outputs.simple_release == 'true' }}
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: '~> v2'
          args: release --clean --config=.goreleaser.simple.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: skip

      - name: Assert dependency files remained unchanged
        run: git diff --exit-code -- backend/go.mod backend/go.sum

      - name: Update Docker Hub description
        if: ${{ needs.release-meta.outputs.simple_release != 'true' && env.DOCKERHUB_PUSH_ENABLED == 'true' }}
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/lightbridge
          short-description: 'LightBridge - AI API Gateway Platform'
          readme-filepath: ./deploy/DOCKER.md

      - name: Send Telegram notification
        if: ${{ needs.release-meta.outputs.simple_release != 'true' }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG_NAME: ${{ needs.release-meta.outputs.tag_name }}
          VERSION: ${{ needs.release-meta.outputs.version }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          REPOSITORY: ${{ github.repository }}
          GHCR_OWNER: ${{ steps.lowercase.outputs.owner }}
        run: |
          set -euo pipefail
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo 'Telegram credentials are not configured; skipping notification.'
            exit 0
          fi

          SAFE_TAG_MESSAGE="$(printf '%s' "$TAG_MESSAGE" | sed 's/\([_*`\[]\)/\\\1/g')"
          if [ "${#SAFE_TAG_MESSAGE}" -gt 3500 ]; then
            SAFE_TAG_MESSAGE="${SAFE_TAG_MESSAGE:0:3500}..."
          fi

          MESSAGE="🚀 *LightBridge 新版本发布！*"$'\n\n'
          MESSAGE+="📦 版本号: \`${VERSION}\`"$'\n\n'
          if [ -n "$SAFE_TAG_MESSAGE" ]; then
            MESSAGE+="${SAFE_TAG_MESSAGE}"$'\n\n'
          fi
          MESSAGE+="🐳 *Docker 部署:*"$'\n'
          MESSAGE+="\`\`\`bash"$'\n'
          if [ "$DOCKERHUB_PUSH_ENABLED" = 'true' ]; then
            MESSAGE+="docker pull ${DOCKERHUB_USERNAME}/lightbridge:${VERSION}"$'\n'
          fi
          MESSAGE+="docker pull ghcr.io/${GHCR_OWNER}/lightbridge:${VERSION}"$'\n'
          MESSAGE+="\`\`\`"$'\n\n'
          MESSAGE+="🔗 [GitHub Release](https://github.com/${REPOSITORY}/releases/tag/${TAG_NAME})"

          curl --fail-with-body --silent --show-error \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$MESSAGE" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", disable_web_page_preview: true}')"

  preview-release:
    name: Build preview ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: [release-meta, verify-source, build-frontend]
    if: ${{ needs.release-meta.outputs.is_preview == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.release-meta.outputs.tag_name }}

      - name: Verify immutable checkout
        env:
          EXPECTED_SHA: ${{ needs.release-meta.outputs.tag_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Download VERSION artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: version-file-${{ needs.release-meta.outputs.tag_name }}
          path: backend/cmd/server/

      - name: Download frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist-${{ needs.release-meta.outputs.tag_name }}
          path: backend/internal/web/dist/

      - name: Verify downloaded artifacts
        env:
          VERSION: ${{ needs.release-meta.outputs.version }}
        run: |
          set -euo pipefail
          test "$(tr -d '\r\n' < backend/cmd/server/VERSION)" = "$VERSION"
          test -n "$(find backend/internal/web/dist -type f -print -quit)"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Build preview binary
        working-directory: backend
        env:
          VERSION: ${{ needs.release-meta.outputs.version }}
          COMMIT: ${{ needs.release-meta.outputs.tag_sha }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p ../dist/preview
          EXT=''
          if [ "$GOOS" = 'windows' ]; then
            EXT='.exe'
          fi
          OUT="../dist/preview/LightBridge_${VERSION}_${GOOS}_${GOARCH}${EXT}"
          CGO_ENABLED=0 go build \
            -tags=embed \
            -trimpath \
            -ldflags="-s -w -X main.Commit=${COMMIT} -X main.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.BuildType=release" \
            -o "$OUT" \
            ./cmd/server
          test -s "$OUT"

      - name: Upload preview binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: preview-${{ needs.release-meta.outputs.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/preview/LightBridge_${{ needs.release-meta.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}*
          if-no-files-found: error
          retention-days: 1

  publish-preview-release:
    name: Publish preview release
    permissions:
      contents: write
    needs: [release-meta, preview-release]
    if: ${{ needs.release-meta.outputs.is_preview == 'true' && needs.preview-release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.release-meta.outputs.tag_name }}

      - name: Verify immutable checkout
        env:
          EXPECTED_SHA: ${{ needs.release-meta.outputs.tag_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Download preview binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: preview-${{ needs.release-meta.outputs.tag_name }}-*
          path: dist/preview
          merge-multiple: true

      - name: Verify preview artifacts and generate checksums
        run: |
          set -euo pipefail
          test -n "$(find dist/preview -maxdepth 1 -type f -name 'LightBridge_*' -print -quit)"
          cd dist/preview
          sha256sum LightBridge_* > checksums.txt
          test -s checksums.txt

      - name: Read tag message
        id: tag_message
        env:
          TAG_NAME: ${{ needs.release-meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          TAG_MESSAGE="$(git for-each-ref --format='%(contents)' "refs/tags/${TAG_NAME}")"
          if [ -z "$TAG_MESSAGE" ]; then
            TAG_MESSAGE="Preview build ${TAG_NAME}"
          fi
          DELIMITER="TAG_MESSAGE_$(openssl rand -hex 16)"
          {
            echo "message<<${DELIMITER}"
            printf '%s\n' "$TAG_MESSAGE"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update preview release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-meta.outputs.tag_name }}
          VERSION: ${{ needs.release-meta.outputs.version }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "LightBridge ${VERSION} (Preview)" \
              --notes "$TAG_MESSAGE" \
              --prerelease
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --title "LightBridge ${VERSION} (Preview)" \
              --notes "$TAG_MESSAGE" \
              --prerelease
          fi
          gh release upload "$TAG_NAME" dist/preview/LightBridge_* dist/preview/checksums.txt --clobber

  sync-version-file:
    name: Sync released VERSION to default branch
    permissions:
      contents: write
    needs: [release-meta, release, publish-preview-release]
    if: ${{ always() && (needs.release.result == 'success' || needs.publish-preview-release.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync VERSION file with bounded retry
        env:
          VERSION: ${{ needs.release-meta.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          for attempt in 1 2 3; do
            git fetch origin "$DEFAULT_BRANCH"
            git reset --hard "origin/${DEFAULT_BRANCH}"

            CURRENT_VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION || true)"
            if [ "$CURRENT_VERSION" = "$VERSION" ]; then
              echo "VERSION already matches $VERSION"
              exit 0
            fi

            printf '%s\n' "$VERSION" > backend/cmd/server/VERSION
            git add backend/cmd/server/VERSION
            git commit -m "chore: sync VERSION to ${VERSION} [skip ci]"

            if git push origin "HEAD:${DEFAULT_BRANCH}"; then
              exit 0
            fi
            echo "VERSION push raced with another update (attempt ${attempt}/3); retrying."
            sleep $((attempt * 3))
          done

          echo 'Failed to sync VERSION after 3 attempts.' >&2
          exit 1
