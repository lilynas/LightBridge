name: Trusted PR17 Remediation

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: trusted-pr17-finalizer
  cancel-in-progress: true

jobs:
  apply:
    if: contains(github.event.head_commit.message, '[pr17-remediate]')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/universal-router-diagnostics-phase1
          fetch-depth: 0

      - name: Configure and synchronize
        run: |
          set -euo pipefail
          git config user.name 'openai-ci-fixer'
          git config user.email 'openai-ci-fixer@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply source, contract, lint, and workflow fixes
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          import re

          def read(path: str) -> str:
              return Path(path).read_text(encoding='utf-8')

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding='utf-8')

          def remove_go_function(text: str, name: str) -> str:
              match = re.search(rf'(?m)^func\s+(?:\([^\n]*\)\s+)?{re.escape(name)}\s*\(', text)
              if not match:
                  return text
              start = match.start()
              brace = text.find('{', match.end())
              if brace < 0:
                  raise RuntimeError(f'opening brace not found: {name}')
              depth = 0
              i = brace
              delimiter = None
              escaped = False
              line_comment = False
              block_comment = False
              while i < len(text):
                  ch = text[i]
                  nxt = text[i + 1] if i + 1 < len(text) else ''
                  if line_comment:
                      if ch == '\n':
                          line_comment = False
                  elif block_comment:
                      if ch == '*' and nxt == '/':
                          block_comment = False
                          i += 1
                  elif delimiter:
                      if delimiter != '`' and escaped:
                          escaped = False
                      elif delimiter != '`' and ch == '\\':
                          escaped = True
                      elif ch == delimiter:
                          delimiter = None
                  else:
                      if ch == '/' and nxt == '/':
                          line_comment = True
                          i += 1
                      elif ch == '/' and nxt == '*':
                          block_comment = True
                          i += 1
                      elif ch in ('"', "'", '`'):
                          delimiter = ch
                      elif ch == '{':
                          depth += 1
                      elif ch == '}':
                          depth -= 1
                          if depth == 0:
                              end = i + 1
                              while end < len(text) and text[end] in ' \t':
                                  end += 1
                              if end < len(text) and text[end] == '\n':
                                  end += 1
                              return text[:start] + text[end:]
                  i += 1
              raise RuntimeError(f'closing brace not found: {name}')

          # TokenRefreshService gained the Grok OAuth dependency.
          for filename in (
              'backend/internal/service/token_refresh_service_test.go',
              'backend/internal/service/openai_privacy_retry_test.go',
          ):
              text = read(filename)
              text = re.sub(
                  r'NewTokenRefreshService\(([^,\n]+), nil, nil, nil, (?!nil, )',
                  r'NewTokenRefreshService(\1, nil, nil, nil, nil, ',
                  text,
              )
              write(filename, text)

          # Grok has no pricing catalogue sync implementation.
          path = 'backend/internal/handler/admin/channel_handler_test.go'
          write(path, read(path).replace(
              '[]string{"anthropic", "openai", "gemini", "grok", "antigravity"}',
              '[]string{"anthropic", "openai", "gemini", "antigravity"}',
          ))

          # API contract fixtures.
          path = 'backend/internal/server/api_contract_test.go'
          text = read(path)
          group_start = text.index('"name": "Group One"')
          group_end = text.index('\n\t\t\t\t\t}', group_start)
          fragment = text[group_start:group_end]
          if '"peak_rate_enabled": false' not in fragment:
              old = (
                  '\t\t\t\t\t"name": "Group One",\n'
                  '\t\t\t\t\t"description": "desc",\n'
                  '\t\t\t\t\t"platform": "anthropic",'
              )
              new = (
                  '\t\t\t\t\t"name": "Group One",\n'
                  '\t\t\t\t\t"description": "desc",\n'
                  '\t\t\t\t\t"peak_end": "",\n'
                  '\t\t\t\t\t"peak_rate_enabled": false,\n'
                  '\t\t\t\t\t"peak_rate_multiplier": 0,\n'
                  '\t\t\t\t\t"peak_start": "",\n'
                  '\t\t\t\t\t"platform": "anthropic",'
              )
              if old not in text:
                  raise RuntimeError('Group One contract anchor not found')
              text = text.replace(old, new, 1)
              group_start = text.index('"name": "Group One"')
              group_end = text.index('\n\t\t\t\t\t}', group_start)
              fragment = text[group_start:group_end]
          if '"upstream_protocols": null' not in fragment:
              updated = text.index('"updated_at": "2025-01-02T03:04:05Z"', group_start, group_end)
              line_end = text.index('\n', updated)
              line_start = text.rfind('\n', group_start, updated) + 1
              indent = text[line_start:updated]
              text = text[:line_end] + ',\n' + indent + '"upstream_protocols": null' + text[line_end:]

          settings_line = '\t\t\t\t\t"available_channels_enabled": false,'
          settings_new = (
              '\t\t\t\t\t"announcements_enabled": false,\n'
              '\t\t\t\t\t"promo_enabled": false,\n'
              '\t\t\t\t\t"redeem_enabled": false,\n'
              + settings_line
          )
          if settings_new not in text:
              text = text.replace(settings_line, settings_new)

          quota_old = (
              '"default_platform_quotas": {"anthropic":{"daily":null,"weekly":null,"monthly":null},'
              '"antigravity":{"daily":null,"weekly":null,"monthly":null},'
              '"gemini":{"daily":null,"weekly":null,"monthly":null},'
              '"openai":{"daily":null,"weekly":null,"monthly":null}},'
          )
          quota_new = (
              '"default_platform_quotas": {"anthropic":{"daily":null,"weekly":null,"monthly":null},'
              '"antigravity":{"daily":null,"weekly":null,"monthly":null},'
              '"custom":{"daily":null,"weekly":null,"monthly":null},'
              '"gemini":{"daily":null,"weekly":null,"monthly":null},'
              '"grok":{"daily":null,"weekly":null,"monthly":null},'
              '"openai":{"daily":null,"weekly":null,"monthly":null}},'
          )
          text = text.replace(quota_old, quota_new)
          write(path, text)

          # errcheck and staticcheck repairs.
          path = 'backend/internal/handler/admin/lightbridge_connect_handler.go'
          write(path, read(path).replace(
              '\t\t\th.db.Exec(`\n\t\t\t\tUPDATE accounts',
              '\t\t\t_, _ = h.db.Exec(`\n\t\t\t\tUPDATE accounts',
          ))

          path = 'backend/internal/modules/proxy/internal/mihomo/compiler_test.go'
          write(path, read(path).replace(
              '\tgroups := doc["proxy-groups"].([]any)\n\tgroup := groups[0].(map[string]any)',
              '\tgroups, ok := doc["proxy-groups"].([]any)\n'
              '\trequire.True(t, ok)\n'
              '\trequire.NotEmpty(t, groups)\n'
              '\tgroup, ok := groups[0].(map[string]any)\n'
              '\trequire.True(t, ok)',
          ))

          for filename in (
              'backend/internal/repository/channel_monitor_repo.go',
              'backend/internal/repository/module_store.go',
          ):
              write(filename, read(filename).replace(
                  'defer rows.Close()',
                  'defer func() { _ = rows.Close() }()',
              ))

          path = 'backend/internal/service/gemini_native_protocol_adapter_test.go'
          write(path, read(path).replace(
              '\trequire.Equal(t, float64(8), resp["usageMetadata"].(map[string]any)["totalTokenCount"])',
              '\tusageMetadata, ok := resp["usageMetadata"].(map[string]any)\n'
              '\trequire.True(t, ok)\n'
              '\trequire.Equal(t, float64(8), usageMetadata["totalTokenCount"])',
          ))

          path = 'backend/internal/service/privacy_filter.go'
          write(path, read(path).replace(
              "\t\tb.WriteString(r.Replacement)\n\t\tb.WriteByte('\\n')",
              "\t\t_, _ = b.WriteString(r.Replacement)\n\t\t_ = b.WriteByte('\\n')",
          ))

          path = 'backend/internal/handler/ops_error_logger.go'
          write(path, read(path).replace(
              'ErrorBody:    string(w.buf.Bytes()),',
              'ErrorBody:    w.buf.String(),',
          ))

          path = 'backend/internal/service/lightbridge_connect_service.go'
          write(path, read(path).replace(
              'fmt.Errorf("New API returned success=false")',
              'fmt.Errorf("new API returned success=false")',
          ))

          dead = {
              'backend/internal/service/codex_image_generation_bridge.go': (
                  'boolOverridePtr', 'boolOverrideFromMap', 'platformBoolOverride',
              ),
              'backend/internal/service/gateway_service.go': (
                  'billingModelForRestriction', 'resolveAccountUpstreamModel',
              ),
              'backend/internal/service/model_rate_limit.go': ('antigravityModelRateLimitKeys',),
              'backend/internal/service/openai_gateway_service.go': (
                  'resolveOpenAIAccountUpstreamModelForRequest',
              ),
          }
          for filename, names in dead.items():
              text = read(filename)
              for name in names:
                  text = remove_go_function(text, name)
              write(filename, text)

          # Remove expired xlsx exceptions; the dependency is upgraded below.
          path = '.github/audit-exceptions.yml'
          lines = read(path).splitlines(True)
          output = []
          i = 0
          while i < len(lines):
              if lines[i].startswith('  - package: xlsx'):
                  i += 1
                  while i < len(lines) and not lines[i].startswith('  - package:'):
                      i += 1
                  continue
              output.append(lines[i])
              i += 1
          write(path, ''.join(output))

          for filename in (
              '.github/workflows/backend-ci.yml',
              '.github/workflows/security-scan.yml',
              '.github/workflows/release.yml',
          ):
              write(filename, read(filename).replace('go1.26.4', 'go1.26.5'))
          PY

          cd backend
          gofmt -w \
            cmd/ui-theme/main.go \
            internal/handler/admin/channel_handler_test.go \
            internal/handler/admin/lightbridge_connect_handler.go \
            internal/handler/admin/setting_handler.go \
            internal/handler/ops_error_logger.go \
            internal/modules/proxy/internal/mihomo/compiler_test.go \
            internal/repository/channel_monitor_repo.go \
            internal/repository/module_store.go \
            internal/repository/ui_theme_repo.go \
            internal/server/api_contract_test.go \
            internal/service/codex_image_generation_bridge.go \
            internal/service/gateway_service.go \
            internal/service/gemini_native_protocol_adapter_test.go \
            internal/service/lightbridge_connect_service.go \
            internal/service/model_rate_limit.go \
            internal/service/openai_gateway_service.go \
            internal/service/openai_privacy_retry_test.go \
            internal/service/privacy_filter.go \
            internal/service/token_refresh_service_test.go
          cd ..

          git add -A
          git commit -m 'fix: repair CI contracts and lint failures'
          git push origin HEAD:fix/universal-router-diagnostics-phase1

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Apply Go security fixes
        run: |
          set -euo pipefail
          cd backend
          go mod edit -go=1.26.5
          go get github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
          go get github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
          go mod tidy
          cd ..
          git add backend/go.mod backend/go.sum
          git commit -m 'fix(security): update Go and AWS SDK dependencies'
          git push origin HEAD:fix/universal-router-diagnostics-phase1

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22.13'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Apply SheetJS security fix
        run: |
          set -euo pipefail
          cd frontend
          pnpm add 'xlsx@https://cdn.sheetjs.com/xlsx-0.20.3/xlsx-0.20.3.tgz'
          pnpm install --frozen-lockfile
          cd ..
          git add frontend/package.json frontend/pnpm-lock.yaml
          git commit -m 'fix(security): update SheetJS dependency'
          git push origin HEAD:fix/universal-router-diagnostics-phase1

      - name: Mark remediation complete
        run: |
          echo complete > .pr17-remediation-complete
          git add .pr17-remediation-complete
          git commit -m 'chore(ci): mark PR17 remediation complete'
          git push origin HEAD:fix/universal-router-diagnostics-phase1
