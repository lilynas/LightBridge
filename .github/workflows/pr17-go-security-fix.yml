name: PR17 Go Security Fix

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pr17-go-security
  cancel-in-progress: true

jobs:
  fix:
    if: contains(github.event.head_commit.message, '[pr17-go-security]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOPROXY: https://proxy.golang.org,direct
      GOSUMDB: sum.golang.org
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/universal-router-diagnostics-phase1
          fetch-depth: 0
      - name: Mark start
        run: |
          set -euo pipefail
          git config user.name 'openai-ci-fixer'
          git config user.email 'openai-ci-fixer@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main
          date -u +%FT%TZ > .pr17-go-security-state
          git add .pr17-go-security-state
          git commit -m 'chore(ci): restart consolidated Go security remediation'
          git push origin HEAD:fix/universal-router-diagnostics-phase1
      - name: Update dependencies
        id: update
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            set -euxo pipefail
            go version
            python <<'PY'
          from pathlib import Path
          for filename in (
              '.github/workflows/backend-ci.yml',
              '.github/workflows/security-scan.yml',
              '.github/workflows/release.yml',
          ):
              path = Path(filename)
              path.write_text(path.read_text().replace('go1.26.4', 'go1.26.5'))
          PY
            cd backend
            timeout 300s go get \
              github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3 \
              github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
            python - <<'PY'
          from pathlib import Path
          import re
          path = Path('go.mod')
          text = re.sub(r'(?m)^go\s+\S+$', 'go 1.26.5', path.read_text(), count=1)
          path.write_text(text)
          PY
            cd ..
          } > pr17-go-security.log 2>&1
      - name: Push result
        if: always()
        run: |
          set -euo pipefail
          if [ '${{ steps.update.outcome }}' = 'success' ]; then
            rm -f .pr17-go-security-state pr17-go-security.log
            git add backend/go.mod backend/go.sum \
                    .github/workflows/backend-ci.yml \
                    .github/workflows/security-scan.yml \
                    .github/workflows/release.yml
            git add -u .pr17-go-security-state
            git commit -m 'fix(security): update Go and AWS SDK dependencies'
          else
            git add .pr17-go-security-state pr17-go-security.log
            git commit -m 'chore(ci): capture Go security remediation failure'
          fi
          git push origin HEAD:fix/universal-router-diagnostics-phase1
